<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>msmap</title>
    <meta name="description" content="Real-time map of MikroTik firewall traffic and threat activity.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%' y='50%' text-anchor='middle' dominant-baseline='central' font-size='82'>🌐</text></svg>">
    <style>{{LEAFLET_CSS}}</style>
    <style>{{MARKERCLUSTER_CSS}}</style>
    <style>{{MARKERCLUSTER_DEFAULT_CSS}}</style>
    <style>{{APP_CSS}}</style>
</head>
<body>
    <div id="map"></div>

    <!-- Controls toggle button (top-right) -->
    <button id="filter-toggle" title="Toggle controls" aria-label="Toggle controls">&#9881;</button>

    <!-- Tabbed controls panel -->
    <div id="filter-panel">
        <div class="filter-header">
            <div class="filter-header-actions">
                <div class="filter-header-toggle-group" role="group" aria-label="Motion">
                    <span class="filter-header-toggle-label">Motion</span>
                    <div class="filter-header-toggle">
                        <button id="f-motion-on" class="filter-header-toggle-button is-active"
                                type="button" data-motion="on" aria-pressed="true">On</button>
                        <button id="f-motion-off" class="filter-header-toggle-button"
                                type="button" data-motion="off" aria-pressed="false">Off</button>
                    </div>
                </div>
                <button id="f-defaults" type="button">Defaults</button>
            </div>
        </div>
        <div class="filter-tabs" role="tablist" aria-label="Panel sections">
            <button id="filter-tab-button-filters" class="filter-tab-button is-active" type="button"
                    role="tab" aria-selected="true" aria-controls="filter-tab-filters"
                    data-panel-tab="filters">Filters</button>
            <button id="filter-tab-button-legend" class="filter-tab-button" type="button"
                    role="tab" aria-selected="false" aria-controls="filter-tab-legend"
                    data-panel-tab="legend">Legend</button>
        </div>
        <div class="filter-tab-body">
            <div id="filter-tab-filters" class="filter-tab-panel" role="tabpanel"
                 aria-labelledby="filter-tab-button-filters">
                <label class="filter-label" for="f-time">Time range</label>
                <select id="f-time">
                    <option value="900" selected>Last 15 minutes</option>
                    <option value="3600">Last hour</option>
                    <option value="21600">Last 6 hours</option>
                    <option value="86400">Last 24 hours</option>
                </select>

                <label class="filter-label" for="f-proto">Protocol</label>
                <select id="f-proto">
                    <option value="">All</option>
                    <option value="TCP">TCP</option>
                    <option value="UDP">UDP</option>
                </select>

                <label class="filter-label" for="f-ip">Source IP</label>
                <input id="f-ip" type="text" placeholder="1.2.3.4" maxlength="45"
                       autocomplete="off" spellcheck="false">

                <label class="filter-label" for="f-port">Destination Port</label>
                <input id="f-port" type="text" placeholder="any" maxlength="5" inputmode="numeric"
                       autocomplete="off" spellcheck="false">

                <label class="filter-label" for="f-asn">ASN</label>
                <input id="f-asn" type="text" placeholder="AS14618 / amazon" maxlength="64"
                       autocomplete="off" spellcheck="false">

                <div id="f-threat" class="filter-threat" role="radiogroup" aria-label="Threat">
                    <button type="button" class="filter-threat-button filter-threat-button-all is-active"
                            data-threat="" role="radio" aria-checked="true"
                            aria-label="All threat levels">All</button>
                    <button type="button" class="filter-threat-button"
                            data-threat="unknown" role="radio" aria-checked="false"
                            aria-label="Threat unknown">
                        <span class="filter-threat-dot threat-unknown" aria-hidden="true"></span>
                    </button>
                    <button type="button" class="filter-threat-button"
                            data-threat="clean" role="radio" aria-checked="false"
                            aria-label="Threat clean">
                        <span class="filter-threat-dot threat-clean" aria-hidden="true"></span>
                    </button>
                    <button type="button" class="filter-threat-button"
                            data-threat="low" role="radio" aria-checked="false"
                            aria-label="Threat low">
                        <span class="filter-threat-dot threat-low" aria-hidden="true"></span>
                    </button>
                    <button type="button" class="filter-threat-button"
                            data-threat="medium" role="radio" aria-checked="false"
                            aria-label="Threat medium">
                        <span class="filter-threat-dot threat-medium" aria-hidden="true"></span>
                    </button>
                    <button type="button" class="filter-threat-button"
                            data-threat="high" role="radio" aria-checked="false"
                            aria-label="Threat high">
                        <span class="filter-threat-dot threat-high" aria-hidden="true"></span>
                    </button>
                </div>
                <div id="f-threat-text" class="filter-threat-text">Threats: All</div>
            </div>
            <div id="filter-tab-legend" class="filter-tab-panel" role="tabpanel"
                 aria-labelledby="filter-tab-button-legend" hidden>
                <div id="filter-legend">
                    <div id="legend-home" style="display:none">
                        <div class="legend-title">Home</div>
                        <div class="legend-list">
                            <div class="legend-entry">
                                <span class="legend-symbol-wrap" aria-hidden="true">
                                    <span class="legend-home-swatch"></span>
                                </span>
                                <span class="legend-label">Home location</span>
                            </div>
                        </div>
                    </div>
                    <div class="legend-title">Threat</div>
                    <div class="legend-list">
                        <div class="legend-entry"><span class="legend-symbol-wrap" aria-hidden="true"><span class="legend-swatch threat-unknown"></span></span><span class="legend-label">Unknown</span></div>
                        <div class="legend-entry"><span class="legend-symbol-wrap" aria-hidden="true"><span class="legend-swatch threat-clean"></span></span><span class="legend-label">Clean</span></div>
                        <div class="legend-entry"><span class="legend-symbol-wrap" aria-hidden="true"><span class="legend-swatch threat-low"></span></span><span class="legend-label">Low</span></div>
                        <div class="legend-entry"><span class="legend-symbol-wrap" aria-hidden="true"><span class="legend-swatch threat-medium"></span></span><span class="legend-label">Medium</span></div>
                        <div class="legend-entry"><span class="legend-symbol-wrap" aria-hidden="true"><span class="legend-swatch threat-high"></span></span><span class="legend-label">High</span></div>
                    </div>
                    <div class="legend-title">Spikes</div>
                    <div class="legend-list">
                        <div class="legend-entry">
                            <span class="legend-symbol-wrap" aria-hidden="true">
                                <span class="legend-symbol legend-symbol-cluster">
                                <span class="legend-symbol-cluster-core"></span>
                                <i class="cluster-spike-badge">!</i>
                                </span>
                            </span>
                            <span class="legend-label">Cluster spike</span>
                        </div>
                        <div class="legend-entry">
                            <span class="legend-symbol-wrap" aria-hidden="true"><span class="legend-symbol legend-symbol-node">!</span></span>
                            <span class="legend-label">Node spike</span>
                        </div>
                    </div>
                    <div class="legend-title">Intel</div>
                    <div class="legend-list">
                        <div class="legend-entry">
                            <span class="legend-symbol-wrap"><span class="popup-chip popup-chip-intel">Tor</span></span>
                            <span class="legend-label">Tor exit</span>
                        </div>
                        <div class="legend-entry">
                            <span class="legend-symbol-wrap"><span class="popup-chip popup-chip-intel">DROP</span></span>
                            <span class="legend-label">Spamhaus DROP</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Status bar -->
    <div id="status-bar">
        <div id="status-left">
            <div class="status-group status-tooltip-target status-tooltip-align-left" tabindex="0" data-tooltip="Visible markers and total hits after active filters.">
                <span id="stat-mapped" class="status-item">
                    <span class="status-label">Mapped</span>
                    <span id="stat-mapped-value" class="status-value status-value-ops">0</span>
                </span>
                <span class="status-sep" aria-hidden="true">&middot;</span>
                <span id="stat-total" class="status-item">
                    <span class="status-label">Hits</span>
                    <span id="stat-total-value" class="status-value status-value-ops">0</span>
                </span>
            </div>
            <div id="status-ops" class="status-group">
                <span id="stat-events" class="status-item status-item-ops status-tooltip-target" style="display:none" tabindex="0" data-tooltip="Connection rows retained for the last 24-hour window.">
                    <span class="status-label">Events</span>
                    <span id="stat-events-value" class="status-value status-value-ops">--</span>
                </span>
                <span class="status-sep status-sep-ops" aria-hidden="true" style="display:none">&middot;</span>
                <span id="stat-sources" class="status-item status-item-ops status-tooltip-target" style="display:none" tabindex="0" data-tooltip="Distinct source IPs retained for the last 24-hour window.">
                    <span class="status-label">Sources</span>
                    <span id="stat-sources-value" class="status-value status-value-ops">--</span>
                </span>
                <span class="status-sep status-sep-ops" aria-hidden="true" style="display:none">&middot;</span>
                <span id="stat-intel" class="status-item status-item-ops status-tooltip-target" style="display:none" tabindex="0" data-tooltip="Tor exit and Spamhaus DROP feed refresh state.">
                    <span class="status-label">Feeds</span>
                    <span id="stat-intel-value" class="status-value status-value-ops">--</span>
                </span>
                <span class="status-sep status-sep-ops" aria-hidden="true" style="display:none">&middot;</span>
                <span id="stat-abuse" class="status-item status-item-ops status-tooltip-target" style="display:none" tabindex="0" data-tooltip="AbuseIPDB lookup state and daily quota.">
                    <span class="status-label">Abuse</span>
                    <span id="stat-abuse-value" class="status-value status-value-ops">--</span>
                </span>
            </div>
            <span id="stat-error" style="display:none"></span>
        </div>
        <div id="status-right">
            <div id="stat-time" class="status-group status-freshness status-tooltip-target status-tooltip-align-right" tabindex="0" data-tooltip="Age of the current map snapshot from /api/map.">
                <span class="status-dot is-unknown" aria-hidden="true"></span>
                <span id="stat-time-value">Waiting for data</span>
            </div>
            <span id="stat-brand">
                <span class="brand-mark" aria-hidden="true">🌐</span>
                <span class="brand-name">msmap</span>
            </span>
            <a href="https://github.com/mtstanfield/msmap" target="_blank" rel="noopener noreferrer">GitHub</a>
            <span id="stat-built">built {{BUILD_DATE}}</span>
        </div>
    </div>

    <script>{{LEAFLET_JS}}</script>
    <script>{{MARKERCLUSTER_JS}}</script>
    <script>{{STATE_JS}}</script>
    <script>{{FILTERS_JS}}</script>
    <script>{{API_JS}}</script>
    <script>{{UI_MAP_JS}}</script>
    <script>{{APP_JS}}</script>
</body>
</html>
