<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>msmap</title>
    <meta name="description" content="Mikrotik firewall log live map">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
    <style>{{LEAFLET_CSS}}</style>
    <style>{{MARKERCLUSTER_CSS}}</style>
    <style>{{MARKERCLUSTER_DEFAULT_CSS}}</style>
    <style>{{APP_CSS}}</style>
</head>
<body>
    <div id="map"></div>

    <!-- Filter toggle button (top-right) -->
    <button id="filter-toggle" title="Toggle filters" aria-label="Toggle filters">&#9881;</button>

    <!-- Filter panel (open by default) -->
    <div id="filter-panel">
        <div class="filter-title">Filters</div>

        <label class="filter-label" for="f-time">Time range</label>
        <select id="f-time">
            <option value="900" selected>Last 15 minutes</option>
            <option value="3600">Last hour</option>
            <option value="21600">Last 6 hours</option>
            <option value="86400">Last 24 hours</option>
        </select>

        <label class="filter-label" for="f-proto">Protocol</label>
        <select id="f-proto">
            <option value="">All</option>
            <option value="TCP">TCP</option>
            <option value="UDP">UDP</option>
            <option value="ICMP">ICMP</option>
        </select>

        <label class="filter-label" for="f-ip">Source IP</label>
        <input id="f-ip" type="text" placeholder="1.2.3.4" maxlength="45"
               autocomplete="off" spellcheck="false">

        <label class="filter-label" for="f-port">Dst Port</label>
        <input id="f-port" type="number" placeholder="any" min="1" max="65535">

        <label class="filter-label" for="f-country">Country</label>
        <input id="f-country" type="text" placeholder="US" maxlength="2"
               autocomplete="off" spellcheck="false" style="text-transform:uppercase">

        <label class="filter-label filter-check-row" for="f-dedup">
            <input type="checkbox" id="f-dedup" checked>
            Unique IPs
        </label>
        <label class="filter-label filter-check-row" for="f-tor">
            <input type="checkbox" id="f-tor">
            Tor exits
        </label>
        <label class="filter-label filter-check-row" for="f-datacenter">
            <input type="checkbox" id="f-datacenter">
            Datacenter
        </label>
        <label class="filter-label filter-check-row" for="f-residential">
            <input type="checkbox" id="f-residential">
            Residential
        </label>

        <div class="filter-actions">
            <button id="f-apply">Apply</button>
            <button id="f-clear">Clear</button>
        </div>
    </div>

    <!-- Status bar -->
    <div id="status-bar">
        <span id="stat-mapped">0 mapped</span>
        <span id="stat-total">0 total</span>
        <span id="stat-time">&ndash;</span>
        <span id="stat-error" style="display:none"></span>
        <span id="stat-spacer"></span>
        <span id="stat-meta">msmap &middot; <a href="https://github.com/mtstanfield/msmap" target="_blank" rel="noopener noreferrer">GitHub</a> &middot; MIT License &middot; built {{BUILD_DATE}}</span>
    </div>

    <script>{{LEAFLET_JS}}</script>
    <script>{{MARKERCLUSTER_JS}}</script>
    <script>{{APP_JS}}</script>
</body>
</html>
