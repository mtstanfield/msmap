# /etc/rsyslog.d/msmap.conf
#
# Receives Mikrotik firewall syslog (UDP 514), rewrites the BSD timestamp
# to RFC 3339 (eliminating year ambiguity), and forwards to msmap on TCP 5140.
#
# Replace YOUR.ROUTER.IP with the actual Mikrotik LAN address.
#
# Install: copy to /etc/rsyslog.d/msmap.conf, then: systemctl restart rsyslog

# ── Load UDP input module ───────────────────────────────────────────────────
module(load="imudp")
input(type="imudp" port="514")

# ── Timestamp template ─────────────────────────────────────────────────────
# %TIMESTAMP:::date-rfc3339% produces: 2026-02-27T08:14:23+00:00
# This is the format msmap's parser expects.
template(name="MsmapFmt" type="string"
    string="%TIMESTAMP:::date-rfc3339% %HOSTNAME% %msg%\n")

# ── Forward Mikrotik logs to msmap ─────────────────────────────────────────
if $fromhost-ip == "YOUR.ROUTER.IP" then {
    action(type="omfwd"
           target="127.0.0.1"
           port="5140"
           protocol="tcp"
           template="MsmapFmt")
    stop
}
