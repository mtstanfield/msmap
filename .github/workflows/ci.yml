name: CI

# Run on every push to master and on pull requests targeting master.
# The 'publish' job (image push) only runs on pushes to master, not on PRs.
on:
  push:
    branches: [master]
    paths-ignore:
      - 'README.md'
      - 'PLAN.md'
      - 'CLAUDE.md'
      - 'FINDINGS.md'
      - 'AGENTS.md'
      - 'docs/**'
  pull_request:
    branches: [master]
    paths-ignore:
      - 'README.md'
      - 'PLAN.md'
      - 'CLAUDE.md'
      - 'FINDINGS.md'
      - 'AGENTS.md'
      - 'docs/**'
  schedule:
    - cron: '0 6 * * 6'
  workflow_dispatch:

# Minimal permissions at the workflow level; 'publish' overrides with packages:write.
permissions:
  contents: read

jobs:
  # ── Prepare shared dev-image cache for this workflow run ────────────────────
  prepare-dev-image:
    name: Prepare Dev Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Prime the dev-image cache once for the current workflow run so later
      # jobs can load the same image from a warm GHA cache instead of racing to
      # rebuild it in parallel on cold cache runs.
      - name: Build dev image cache
        uses: docker/build-push-action@v6
        with:
          context: .
          target: dev
          cache-from: type=gha,scope=dev
          cache-to: type=gha,scope=dev,mode=max

  # ── Build and test ───────────────────────────────────────────────────────────
  build-test:
    name: Build & Test
    needs: [prepare-dev-image]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Buildx gives us access to GHA layer caching (type=gha).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Load the prepared dev image into the local daemon for docker run.
      - name: Load dev image from cache
        uses: docker/build-push-action@v6
        with:
          context: .
          target: dev
          load: true          # load into local daemon so docker run works
          tags: msmap-dev:ci
          cache-from: type=gha,scope=dev

      # Configure and build in a single container invocation.
      # Debug mode enables ASan + UBSan (see CMakeLists.txt option block).
      # Use the same CPU target as the published release image so CI validates
      # the shipped codegen profile instead of only the generic fallback.
      - name: Configure and Build (Debug + ASan + UBSan)
        run: |
          /usr/bin/time -f 'build: %E real' docker run --rm -v "$PWD:/workspace" msmap-dev:ci bash -c "
            cmake -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Debug \
              -DCMAKE_CXX_STANDARD=23 \
              -DCMAKE_CXX_EXTENSIONS=OFF \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DMSMAP_CPU_TARGET=x86-64-v3 \
            && ninja -C build"

      # Unit + integration tests under ASan + UBSan.
      # Integration tests bind to 127.0.0.1:54340 — loopback is available
      # inside Docker containers, so no host networking is required here.
      # CMake marks those integration cases RUN_SERIAL, so ctest -j 2 still
      # gets safe parallelism across the rest of the suite.
      - name: Test
        run: |
          /usr/bin/time -f 'ctest: %E real' docker run --rm -v "$PWD:/workspace" msmap-dev:ci \
            ctest --test-dir build --output-on-failure -j 2

  # ── Static analysis (runs in parallel with build-test) ───────────────────────
  lint:
    name: Lint
    needs: [prepare-dev-image]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Load the dev image from the cache primed by the prepare job.
      - name: Load dev image from cache
        uses: docker/build-push-action@v6
        with:
          context: .
          target: dev
          load: true
          tags: msmap-dev:ci
          cache-from: type=gha,scope=dev

      # Configure and generate index_html.h via the web_bundle target.
      # http.cpp #includes index_html.h, so clang-tidy requires it.
      # CMAKE_CXX_SCAN_FOR_MODULES=OFF: CMake 3.28+ scans C++20/23 sources for
      # module imports by default, injecting @*.o.modmap response-file flags into
      # compile_commands.json.  Those files are only created during a real
      # compile; without a full build they are absent and clang-tidy errors out.
      # The project uses no C++ modules (no 'import' statements), so scanning
      # is unnecessary and safe to disable.
      - name: Configure build-lint and generate web bundle
        run: |
          /usr/bin/time -f 'lint configure: %E real' docker run --rm -v "$PWD:/workspace" msmap-dev:ci bash -c "
            cmake -B build-lint -G Ninja \
              -DCMAKE_BUILD_TYPE=Debug \
              -DCMAKE_CXX_STANDARD=23 \
              -DCMAKE_CXX_EXTENSIONS=OFF \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DCMAKE_CXX_SCAN_FOR_MODULES=OFF \
              -DMSMAP_CPU_TARGET=x86-64-v3 \
            && ninja -C build-lint web_bundle"

      # Analyse src/ only; the '/workspace/src/.*' regex excludes Catch2 in
      # _deps/ from analysis.  run-clang-tidy-18 (not run-clang-tidy) is
      # required because the unversioned alias is not installed in the image.
      - name: clang-tidy
        run: |
          echo "clang-tidy mode: full-tree"
          /usr/bin/time -f 'clang-tidy: %E real' docker run --rm -v "$PWD:/workspace" msmap-dev:ci \
            run-clang-tidy-18 -p build-lint '/workspace/src/.*'

      - name: cppcheck
        run: |
          /usr/bin/time -f 'cppcheck: %E real' docker run --rm -v "$PWD:/workspace" msmap-dev:ci \
            cppcheck --enable=style,performance,warning,portability \
              --error-exitcode=1 src/

  # ── Build release image and publish to ghcr.io ─────────────────────────────
  publish:
    name: Publish Image
    needs: [build-test, lint]
    # Only push images for commits that reach master; never for PRs
    # (forks cannot access GITHUB_TOKEN secrets for the target repo).
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate image tags:
      #   ghcr.io/mtstanfield/msmap:latest      (always, on master)
      #   ghcr.io/mtstanfield/msmap:sha-<short> (per-commit, for Unraid pinning)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/mtstanfield/msmap
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      # The release build reuses the dev-stage layers already cached by the
      # 'build-test' job (scope=dev), then adds the builder and runtime layers.
      # Only the binary compilation and distroless copy need fresh compute.
      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=dev
            type=gha,scope=release
          cache-to: type=gha,scope=release,mode=max

  cleanup-registry:
    name: Cleanup Registry
    needs: [publish]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # Keep a small rollback window of recent published image versions while
      # pruning older GHCR entries created by the rolling sha-* tags.
      - name: Delete old GHCR versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: msmap
          package-type: container
          min-versions-to-keep: 30
